apiVersion: apps/v1
kind: Deployment
metadata:
  name: flash-estoque
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flash-estoque
  template:
    metadata:
      labels:
        app: flash-estoque
    spec:
      containers:
      - name: estoque
        image: ederdcsp18/flash-estoque:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: estoque-service
spec:
  selector:
    app: flash-estoque
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP